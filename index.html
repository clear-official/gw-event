<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5月の12星座運勢診断</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #ffd6e7, #d9f3ff, #fff5cc);
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    .zodiac-btn {
      background: #fff;
      border-radius: 20px;
      padding: 10px;
      transition: 0.2s;
    }
    .zodiac-btn:hover {
      transform: scale(1.05);
    }
    .result { display:none; }
    .result.active { display:block; }
  </style>
</head>
<body class="font-sans text-center p-4">

<h1 class="text-2xl font-bold mb-4">✨5月の運勢診断✨</h1>
<p class="mb-6 text-sm">あなたの星座キャラを選んでね</p>

<div id="buttons" class="grid grid-cols-3 gap-3 max-w-md mx-auto"></div>

<div id="result" class="result mt-6 max-w-md mx-auto card p-5">
  <h2 id="name" class="text-xl font-bold mb-2"></h2>
  <div id="stars" class="text-yellow-400 text-xl mb-2"></div>
  <p id="text" class="text-sm mb-4"></p>

  <a href="ここにプロフィールURL" class="block bg-pink-400 text-white font-bold py-3 rounded-xl">鑑定士に相談する</a>
</div>

<script>
const data = [
  {name:"牡羊座",img:"星座_牡羊座.png",star:4,text:"勢いのある月！"},
  {name:"牡牛座",img:"星座_牡牛座.png",star:5,text:"安定して好調！"},
  {name:"双子座",img:"星座_双子座.png",star:4,text:"人間関係がカギ"},
  {name:"蟹座",img:"星座_蟹座.png",star:4,text:"感情がテーマ"},
  {name:"獅子座",img:"星座_獅子座.png",star:5,text:"主役になれる"},
  {name:"乙女座",img:"星座_乙女座.png",star:4,text:"努力が実る"},
  {name:"天秤座",img:"星座_天秤座.png",star:4,text:"バランス重要"},
  {name:"蠍座",img:"星座_蠍座.png",star:4,text:"深い縁あり"},
  {name:"射手座",img:"星座_射手座.png",star:5,text:"最強運"},
  {name:"山羊座",img:"星座_山羊座.png",star:5,text:"結果が出る"},
  {name:"水瓶座",img:"星座_水瓶座.png",star:3,text:"慎重に"},
  {name:"魚座",img:"星座_魚座.png",star:5,text:"願い叶う"}
];

const wrap = document.getElementById("buttons");

data.forEach((d,i)=>{
  const btn = document.createElement("div");
  btn.className="zodiac-btn";
  btn.innerHTML = `<img src="${d.img}" class="w-full rounded-xl">`;
  btn.onclick = ()=>show(i);
  wrap.appendChild(btn);
});

function show(i){
  const d = data[i];
  document.getElementById("result").classList.add("active");
  document.getElementById("name").innerText = d.name;
  document.getElementById("text").innerText = d.text;
  document.getElementById("stars").innerText = "★".repeat(d.star);
}
</script>

</body>
</html>
